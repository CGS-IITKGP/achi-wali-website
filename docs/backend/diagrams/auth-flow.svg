<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" role="img" aria-label="Google OAuth flow">
  <style>
    .box { fill: #ffffff; stroke: #c9b8a3; stroke-width: 1.5; rx: 12; }
    .title { font-family: "Space Grotesk", Arial, sans-serif; font-size: 13px; fill: #1f1c18; }
    .muted { font-family: "Space Grotesk", Arial, sans-serif; font-size: 11px; fill: #5f5a52; }
    .arrow { stroke: #6b5e52; stroke-width: 1.6; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6b5e52" />
    </marker>
  </defs>

  <rect class="box" x="40" y="50" width="170" height="60" />
  <text class="title" x="60" y="82">Browser</text>
  <text class="muted" x="60" y="100">User session</text>

  <rect class="box" x="250" y="50" width="190" height="60" />
  <text class="title" x="270" y="82">/api/auth/google</text>
  <text class="muted" x="270" y="100">Redirect to Google</text>

  <rect class="box" x="490" y="30" width="180" height="60" />
  <text class="title" x="510" y="62">Google OAuth</text>
  <text class="muted" x="510" y="80">Consent + ID token</text>

  <rect class="box" x="490" y="120" width="180" height="60" />
  <text class="title" x="510" y="152">/api/auth/google/callback</text>
  <text class="muted" x="510" y="170">Exchange code</text>

  <rect class="box" x="250" y="170" width="190" height="60" />
  <text class="title" x="270" y="202">authService.googleOAuth</text>
  <text class="muted" x="270" y="220">Verify + upsert user</text>

  <rect class="box" x="40" y="210" width="170" height="60" />
  <text class="title" x="60" y="242">Set session cookie</text>
  <text class="muted" x="60" y="260">JWT in cookie</text>

  <line class="arrow" x1="210" y1="80" x2="250" y2="80" />
  <line class="arrow" x1="440" y1="80" x2="490" y2="60" />
  <line class="arrow" x1="580" y1="90" x2="580" y2="120" />
  <line class="arrow" x1="490" y1="150" x2="440" y2="200" />
  <line class="arrow" x1="250" y1="200" x2="210" y2="240" />
</svg>
